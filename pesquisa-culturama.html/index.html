<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesquisa Culturama</title>
</head>
<body>
      <form action=""><h2>Pesquisa Culturama</h2>

     <fieldset>
        <legend>Dados pessoais</legend>
         <div>
        <label for="nome">Nome:</label>
        <input type="text" id="nome " name="nome" required>
          <br>
         </div>

         <div>
          <label for="idade">Idade:</label>
        <input type="number" id="idade" name="idade" min="12" max="100" required>
          <br>
          </div>
 
        <div>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>
          <br>
          </div>

        <label for="telefone">Telefone:</label>
        <input type="tel" id="telefone" name="telefone" pattern="[0-9] {11}" placeholder="11988887777" required>
          <br>
       
     </fieldset>
      <button type="submit">Enviar</button>
      </form>
    
</body>
</html>
